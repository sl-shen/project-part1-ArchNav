# Fortress build.properties — points to the apacheds container
# This file is used during the build process to configure the Fortress library
HOST=127.0.0.1
PORT=10389

# LDAP admin credentials (default for ApacheDS)
ADMIN_DN=uid=admin,ou=system
ADMIN_PW=secret

# LDAP suffix
SUFFIX=dc=example,dc=com
SUFFIX_NAME=example

# Disable SSL
ENABLE_SSL=false

# Enable ApacheDS
LDAP_SERVER_TYPE=apacheds

# Disable REST
ENABLE_REST=false
